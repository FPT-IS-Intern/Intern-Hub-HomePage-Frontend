<div class="time-card-container">
    <div class="info-section">
        <div class="info-row">
            <i class="wifi" alt="wifi" class="icon"></i>
            <span class="location-text">{{ wifiName }}</span>
        </div>

        <div class="info-row">
            <i src="calendar" alt="calendar" class="icon"></i>
            <span class="date-text">{{ displayDate() }}</span>
        </div>
    </div>

    <div class="time-display">
        {{ displayTime() }}
    </div>
</div>
