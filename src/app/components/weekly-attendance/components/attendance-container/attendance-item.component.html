<div class="attendance-item">
  <div class="attendance-img">
    <img [src]="image()" [alt]="label()" class="attendance-icon" />
  </div>
  <div class="action">
    <div class="response-time-wrapper">
      <p [class.time]="time()">{{ time() ?? '--:--' }}</p>
    </div>

    @if (!statusMessage()) {
    <button class="action-button" [disabled]="disabled()" [class.button-disabled]="disabled()" (click)="onAction.emit()">
      <span class="button-text">{{ label() }}</span>
    </button>
    } @else {
    <div class="status-container">
      <img [src]="statusIcon()" alt="status_icon" class="status-icon" />
      <span class="status-message" [class.text-error]="isError()" [class.text-success]="!isError()">
        {{ statusMessage() }}
      </span>
    </div>
    }
  </div>
</div>
