<div class="attendance-wrapper">
  <app-attendance-item [image]="'https://s3.vn-hcm-1.vietnix.cloud/bravos/check_in.png'" [label]="checkInLabel()"
    [time]="checkInDisplayTime()"
    [statusMessage]="checkInDisplayMessage()"
    [isCheckTimeValid]="status().isCheckInValid" [disabled]="isCheckInDisabled()" [isLoading]="checkInLoading()"
    (onAction)="processAttendance('IN')">
  </app-attendance-item>

  <app-attendance-item [image]="'https://s3.vn-hcm-1.vietnix.cloud/bravos/check_out.png'" [label]="'Check Out'" [time]="checkOutDisplayTime()"
    [statusMessage]="checkOutDisplayMessage()" [isCheckTimeValid]="status().isCheckOutValid"
    [disabled]="isCheckOutDisabled()" [isLoading]="checkOutLoading()" (onAction)="processAttendance('OUT')">
  </app-attendance-item>
</div>
<app-modal #modal (closed)="showPopup.set(false)" />
