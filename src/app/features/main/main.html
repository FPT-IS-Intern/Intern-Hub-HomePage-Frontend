<div class="scale-shell">
  <div class="scale-stage" [style.width.px]="designWidth * viewportScale()" [style.height.px]="canvasHeight() * viewportScale()">
    <div
      #scaleContent
      class="scale-content"
      [style.width.px]="designWidth"
      [style.minHeight.px]="canvasHeight()"
      [style.transform]="'scale(' + viewportScale() + ')'"
    >
      <div class="main-wrapper">
        <div class="main">
          <div class="main-right">
            <div class="banner">
              <app-homepage-banner-slider></app-homepage-banner-slider>
            </div>
            <div class="menu-list">
              <app-card-list-container></app-card-list-container>
            </div>
          </div>
          <div class="weekday-attendance-wrapper">
            <app-attendance-layout></app-attendance-layout>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
